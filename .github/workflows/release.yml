name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: palya-linux-amd64.tar.gz
            binary: palya
            
          # MacOS
          - os: macos-latest
            target: x86_64-apple-darwin
            name: palya-macos-amd64.tar.gz
            binary: palya

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: palya-windows-amd64.zip
            binary: palya.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Archive (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.binary }}
          tar -czvf ${{ matrix.name }} ${{ matrix.binary }} example_site README.md

      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.binary }}
          Compress-Archive -Path ${{ matrix.binary }}, example_site, README.md -DestinationPath ${{ matrix.name }}
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.name }}
          generate_release_notes: true