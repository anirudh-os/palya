name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-upload:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: palya-linux-amd64.tar.gz
            use_cross: false
          
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: palya-macos-amd64.tar.gz
            use_cross: false

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: palya-windows-amd64.zip
            use_cross: false

    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # Linux/Mac Packaging
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          # Copy binary from target to root
          cp target/${{ matrix.target }}/release/palya palya
          
          # Zip binary + example_site + README together
          tar -czvf ${{ matrix.asset_name }} palya example_site README.md

      # Windows Packaging
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Copy binary from target to root
          cp target/${{ matrix.target }}/release/palya.exe palya.exe
          
          # Zip binary + example_site + README together
          7z a ${{ matrix.asset_name }} palya.exe example_site README.md

      - name: Upload Release Asset
        uses: shogo82148/actions-upload-release-asset@v1
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ matrix.asset_name }}
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream